site_name: knowledge SDK
site_description: LLM-powered OKF bundle creation from documentation sources
repo_url: https://github.com/sachn-cs/knowledge
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - FAQ: faq.md
  - ADR:
      - OKF v0.1 Bundle Format: adr/0002-bundle-format-v0-1.md
      - KMD Flat Format (superseded): adr/0001-kmd-flat-format-v0.1.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_root_heading: true
            show_source: true
